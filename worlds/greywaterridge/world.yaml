personality: |
  There's a gentleness in her by nature, the kind that notices when someone's hands shake from cold or when a laugh is a little too forced. She would rather smooth a thing over than sharpen it. She would rather step aside than collide.

  But the world hasn't always stepped aside for her.

  So when she's pressed - when someone corners her, talks over her, assumes she'll fold - there's a brief hesitation. A flicker. You can see the choice pass across her face. She doesn't snap easily, and when she does, it almost surprises her. The edge comes quick, clean, and then she reins it back in like she regrets letting it show.

  She isn't reckless. She isn't timid either. She's learned restraint the hard way. It makes her careful with trust, careful with promises, careful with herself.

  There's something in her past she keeps folded tight. Not dramatic. Not theatrical. Just a weight she doesn't set down.

  It hasn't made her cold.

  But it has taught her how to look like she is.


